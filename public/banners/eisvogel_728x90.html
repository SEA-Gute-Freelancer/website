      rgba(6,14,9,0.3)  20%,
      rgba(6,14,9,0.0)  30%
    );
  }
  .overlay-right {
    position:absolute; inset:0;
    background:linear-gradient(

      rgba(6,14,9,0.88)  90%,
      rgba(6,14,9,0.95) 100%
    );
  }

  /* Text-Block: ganz links */
  .text-group {
    position:absolute;
    left:14px; top:0;
    width:240px; height:90px;
    display:flex; flex-direction:column; justify-content:center;
    padding:0 10px;
  }
  .brand {

    color:#dd4f10; margin-bottom:4px;
    opacity:0; animation:fadeL 0.5s ease forwards 0.3s;
  }
  .headline {
    font-family:'Vollkorn',Georgia,serif;
    font-size:19px; font-weight:700; font-style:italic;
    line-height:1.15; color:#fff;
    text-shadow:0 1px 12px rgba(0,0,0,0.7);

    opacity:0; animation:fadeL 0.6s ease forwards 0.7s;

  .cta {

  }
  .cta:hover { background:#c44510; }
  .arrow {

  @keyframes nudge {

  @keyframes fadeL {

  @keyframes slowZoom {
    from { transform: scale(1.0); }
    to   { transform: scale(1.07); }
  }

  /* Gradient nur oben für Textlesbarkeit */
  .overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      180deg,
      rgba(8,18,12,0.75)  0%,
      rgba(8,18,12,0.58) 18%,
      rgba(8,18,12,0.12) 36%,
      rgba(0,0,0,0.0)    50%,
      rgba(0,0,0,0.0)   100%
    );
  }

  /* Text oben im Himmel */
  .content {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    padding: 22px 20px 0;
  }

  /* Brand label */
  .brand {
    font-family: 'Open Sans', sans-serif;
    font-size: 8px;
    font-weight: 600;
    letter-spacing: 3.5px;
    text-transform: uppercase;
    color: #dd4f10;
    margin-bottom: 11px;
    opacity: 0;
    animation: fadeDown 0.6s ease forwards 0.4s;
  }

  /* Headline — Vollkorn wie die Website */
  .headline {
    font-family: 'Vollkorn', Georgia, serif;
    font-size: 34px;
    font-weight: 700;
    font-style: italic;
    line-height: 1.15;
    color: #ffffff;
    margin-bottom: 14px;
    text-shadow: 0 2px 20px rgba(0,0,0,0.45);
    opacity: 0;
    animation: fadeDown 0.7s ease forwards 0.8s;
  }

  /* Orange rule — aus der CI */
  .rule {
    height: 2px;
    background: linear-gradient(90deg, #dd4f10 0%, rgba(221,79,16,0) 100%);
    width: 0;
    margin-bottom: 14px;
    animation: growRule 0.6s ease forwards 1.3s;
  }
  @keyframes growRule {
    from { width: 0; opacity: 0; }
    to   { width: 80px; opacity: 1; }
  }

  /* Subline — Open Sans wie die Website */
  .subline {
    font-family: 'Open Sans', sans-serif;
    font-size: 12px;
    font-weight: 300;
    line-height: 1.7;
    color: rgba(240,235,225,0.9);
    text-shadow: 0 1px 10px rgba(0,0,0,0.6);
    margin-bottom: 22px;
    opacity: 0;
    animation: fadeDown 0.7s ease forwards 1.5s;
  }

  /* CTA — Eisvogel-Orange */
  .cta {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: #dd4f10;
    color: #ffffff;
    font-family: 'Open Sans', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    padding: 11px 20px;
    border-radius: 2px;
    width: fit-content;
    opacity: 0;
    animation: fadeDown 0.7s ease forwards 1.9s;
    transition: background 0.2s;
    box-shadow: 0 2px 12px rgba(221,79,16,0.4);
  }
  .cta:hover {
    background: #c44510;
  }

  .arrow {
    display: inline-block;
    animation: nudge 2.2s ease-in-out 2.6s infinite;
  }
  @keyframes nudge {
    0%, 100% { transform: translateX(0); }
    50%       { transform: translateX(5px); }
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .frame {
    position: absolute;
    inset: 0;
    border: 1px solid rgba(255,255,255,0.1);
    pointer-events: none;
  }
</style>

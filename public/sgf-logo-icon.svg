<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&amp;family=Plus+Jakarta+Sans:wght@600&amp;display=swap');
    </style>
  </defs>

  <!-- Background: warm cream -->
  <rect width="400" height="400" fill="#FAF8F3"/>

  <!-- Blue square (rounded-sm ≈ 6px radius) -->
  <rect x="100" y="100" width="200" height="200" rx="8" ry="8" fill="#3974f2"/>

  <!-- "SGF" text, white, centered in square -->
  <text
    x="200"
    y="213"
    text-anchor="middle"
    dominant-baseline="middle"
    font-family="'Playfair Display', Georgia, serif"
    font-weight="700"
    font-size="62"
    letter-spacing="6"
    fill="#ffffff"
  >SGF</text>

  <!-- Small dark-blue dot, bottom-right corner of square -->
  <circle cx="305" cy="305" r="12" fill="#204fb5"/>
</svg>

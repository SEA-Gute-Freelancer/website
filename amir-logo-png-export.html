<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<title>Amir Logo – PNG Export</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Allura&display=swap" rel="stylesheet">
<style>
  body { font-family: -apple-system, system-ui, sans-serif; max-width: 720px; margin: 40px auto; padding: 0 20px; color: #222; }
  h1 { font-size: 20px; margin-bottom: 8px; }
  p  { font-size: 14px; color: #555; line-height: 1.5; }
  .preview { background:
    linear-gradient(45deg, #eee 25%, transparent 25%),
    linear-gradient(-45deg, #eee 25%, transparent 25%),
    linear-gradient(45deg, transparent 75%, #eee 75%),
    linear-gradient(-45deg, transparent 75%, #eee 75%);
    background-size: 20px 20px;
    background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
    padding: 24px; border-radius: 8px; margin: 16px 0; }
  .preview svg { display: block; width: 100%; height: auto; }
  button { background: #111; color: #fff; border: 0; padding: 12px 20px; border-radius: 8px; font-size: 14px; cursor: pointer; margin-right: 8px; }
  button.secondary { background: #fff; color: #111; border: 1px solid #ddd; }
  .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-top: 12px; }
  label { font-size: 13px; color: #555; }
  input[type=number] { width: 90px; padding: 6px 8px; border: 1px solid #ddd; border-radius: 6px; }
  .status { font-size: 13px; color: #0a7d2c; margin-top: 12px; min-height: 18px; }
</style>
</head>
<body>
  <h1>Amir – Logo PNG Export</h1>
  <p>Wähle die gewünschte Breite und klicke auf „PNG herunterladen". Der Hintergrund bleibt transparent.</p>

  <div class="preview" id="preview">
    <svg id="logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 260">
      <text x="50" y="190" style="font-family:'Allura', 'Apple Chancery', 'Snell Roundhand', cursive; font-size:220px; fill:#000;">Amir</text>
      <path d="M 470 215 C 430 235, 330 240, 230 225 C 150 213, 90 205, 60 215"
            stroke="#000" stroke-width="4" stroke-linecap="round" fill="none"/>
    </svg>
  </div>

  <div class="row">
    <label>Breite (px): <input type="number" id="width" value="2000" min="200" max="8000" step="100"></label>
    <button id="dlPng">PNG herunterladen</button>
    <button id="dlSvg" class="secondary">SVG herunterladen</button>
  </div>
  <div class="status" id="status"></div>

<script>
const svgEl = document.getElementById('logo');
const status = document.getElementById('status');

function serializeSvg() {
  const clone = svgEl.cloneNode(true);
  // Inline the Google Font so the rasterized PNG includes the script face
  const style = document.createElementNS('http://www.w3.org/2000/svg', 'style');
  style.textContent = "@import url('https://fonts.googleapis.com/css2?family=Allura&display=swap');";
  clone.insertBefore(style, clone.firstChild);
  clone.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
  return new XMLSerializer().serializeToString(clone);
}

async function renderPng(width) {
  await document.fonts.ready;
  const vb = svgEl.viewBox.baseVal;
  const ratio = vb.height / vb.width;
  const height = Math.round(width * ratio);

  const svgString = serializeSvg();
  const blob = new Blob([svgString], { type: 'image/svg+xml;charset=utf-8' });
  const url = URL.createObjectURL(blob);

  const img = new Image();
  img.crossOrigin = 'anonymous';
  await new Promise((res, rej) => { img.onload = res; img.onerror = rej; img.src = url; });

  const canvas = document.createElement('canvas');
  canvas.width = width;
  canvas.height = height;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, width, height);
  ctx.drawImage(img, 0, 0, width, height);
  URL.revokeObjectURL(url);

  return new Promise((res) => canvas.toBlob(res, 'image/png'));
}

document.getElementById('dlPng').addEventListener('click', async () => {
  try {
    status.textContent = 'Rendere PNG …';
    const w = parseInt(document.getElementById('width').value, 10) || 2000;
    const blob = await renderPng(w);
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `amir-logo-${w}px.png`;
    a.click();
    status.textContent = '✓ PNG heruntergeladen.';
  } catch (e) {
    status.style.color = '#b00';
    status.textContent = 'Fehler: ' + e.message;
  }
});

document.getElementById('dlSvg').addEventListener('click', () => {
  const blob = new Blob([serializeSvg()], { type: 'image/svg+xml' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'amir-logo.svg';
  a.click();
  status.style.color = '#0a7d2c';
  status.textContent = '✓ SVG heruntergeladen.';
});

// Auto-trigger on first font load (optional convenience)
document.fonts.ready.then(() => {
  // no auto-download — user picks the size
});
</script>
</body>
</html>
